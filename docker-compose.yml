services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: ./server/.env
    volumes:
      - file_storage:/app/storage
      - db_data:/app/data
    expose:
      - "8080"        # internal only — not published to the host
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  file_storage:
  db_data:

networks:
  internal:
    driver: bridge
