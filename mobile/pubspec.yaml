name: likha
description: Offline Learning Management System
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_riverpod: ^2.4.0
  
  dio: ^5.4.0
  connectivity_plus: ^5.0.0
  
  sqflite: ^2.3.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Functional programming
  dartz: ^0.10.1

  # Dependency injection
  get_it: ^7.6.0

  # Value equality
  equatable: ^2.0.5

  # Environment configuration
  flutter_dotenv: ^5.1.0
  file_picker: ^10.3.10
  path_provider: ^2.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env