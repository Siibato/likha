name: likha
description: Offline Learning Management System
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_riverpod: ^2.4.0
  
  dio: ^5.4.0
  http_parser: ^4.0.0
  connectivity_plus: ^5.0.0
  
  sqflite: ^2.3.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Functional programming
  dartz: ^0.10.1

  # Dependency injection
  get_it: ^7.6.0

  # Value equality
  equatable: ^2.0.5

  # UUID generation
  uuid: ^4.0.0

  # JSON serialization
  json_annotation: ^4.10.0

  # File compression
  archive: ^3.4.0

  # Animated list reordering
  animated_reorderable_list: ^1.3.0

  # Environment configuration
  flutter_dotenv: ^5.1.0
  file_picker: ^10.3.10
  path_provider: ^2.1.0
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/likha-logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/likha-logo.png"
  windows:
    generate: true
    image_path: "assets/images/likha-logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/likha-logo.png"