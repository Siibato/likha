<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Load Test to Failure Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg: #f5f5f5; --card: #fff; --border: #e0e0e0; --text: #333; --muted: #666; --pass: #28a745; --fail: #dc3545; --primary: #4dabf7; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 1.4rem; }
  .container { display: flex; height: calc(100vh - 64px); }
  .sidebar { width: 300px; min-width: 260px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 1rem; }
  .sidebar h2 { margin: 0 0 0.6rem; font-size: 1rem; }
  .run-card { padding: 0.7rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.5rem; cursor: pointer; transition: box-shadow 0.15s; }
  .run-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .run-card.selected { border-color: var(--primary); background: #f0f9ff; }
  .run-card .row { display: flex; justify-content: space-between; align-items: center; }
  .run-card .ts { font-size: 0.75rem; color: var(--muted); }
  .run-card .badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 3px; font-weight: 600; }
  .run-card .badge.pass { background: #d4edda; color: #155724; }
  .run-card .badge.fail { background: #f8d7da; color: #721c24; }
  .main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
  .empty { color: var(--muted); font-size: 0.95rem; }
  .meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin: 1rem 0; }
  .meta-card { background: var(--card); padding: 1rem; border-radius: 6px; border: 1px solid var(--border); }
  .meta-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-card .value { font-size: 1.3rem; font-weight: 600; margin-top: 0.2rem; }
  .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin: 1rem 0; }
  .chart-container canvas { max-height: 400px; }
  h2 { margin-top: 1.5rem; font-size: 1.15rem; border-bottom: 2px solid var(--border); padding-bottom: 0.4rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.6rem; font-size: 0.82rem; background: var(--card); }
  th, td { padding: 0.45rem 0.5rem; text-align: right; border-bottom: 1px solid var(--border); }
  th { text-align: left; background: #f8f9fa; font-weight: 600; }
  td:first-child, th:first-child { text-align: left; }
  .pass { color: var(--pass); }
  .fail { color: var(--fail); }
  .heatmap-cell { text-align: center; font-weight: 600; }
  .heatmap-0 { background: #e8f5e9; color: #1b5e20; }
  .heatmap-1 { background: #d0e8d4; color: #2e7d32; }
  .heatmap-2 { background: #fff9c4; color: #827717; }
  .heatmap-3 { background: #ffe0b2; color: #e65100; }
  .heatmap-4 { background: #ffcdd2; color: #b71c1c; }
  .heatmap-na { background: #f5f5f5; color: #aaa; }
</style>
</head>
<body>
<header>
  <h1>Load Test to Failure Dashboard</h1>
</header>
<div class="container">
  <div class="sidebar" id="sidebar">
    <h2>Runs</h2>
    <div id="runList"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select a run from the sidebar to view VU degradation data.</div>
  </div>
</div>

<script>
let manifest = { reports: [] };
let reportCache = new Map();
let selectedRun = null;
let degradationChart = null;

async function loadArchive() {
  try {
    const res = await fetch('load-test-to-failure-index.json');
    if (!res.ok) {
      const apiRes = await fetch('/api/manifest');
      if (!apiRes.ok) return;
      manifest = await apiRes.json();
    } else {
      manifest = await res.json();
    }

    reportCache.clear();
    for (const entry of manifest.reports) {
      try {
        const reportRes = await fetch(entry.path);
        if (reportRes.ok) {
          const report = await reportRes.json();
          reportCache.set(entry.path, report);
        }
      } catch (e) {
        console.warn(`Failed to load report ${entry.path}:`, e);
      }
    }
  } catch (e) {
    console.error('Failed to load archive:', e);
    manifest = { reports: [] };
    reportCache.clear();
  }
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString();
}

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getRuns() {
  let runs = Array.from(reportCache.values());
  runs.sort((a, b) => new Date(b.meta.timestamp) - new Date(a.meta.timestamp));
  return runs;
}

function renderSidebar() {
  const runs = getRuns();
  const el = document.getElementById('runList');
  if (!runs.length) {
    el.innerHTML = '<div class="empty">No runs found.</div>';
    return;
  }
  el.innerHTML = runs.map(r => {
    const m = r.meta;
    const sel = selectedRun && selectedRun.meta.timestamp === m.timestamp ? 'selected' : '';
    return `<div class="run-card ${sel}" onclick="selectRun('${m.timestamp}')">
      <div class="row">
        <span class="badge ${m.passed ? 'pass' : 'fail'}">${m.passed ? 'PASS' : 'FAIL'}</span>
      </div>
      <div class="ts">${fmtDate(m.timestamp)}</div>
      <div style="margin-top:0.3rem;font-size:0.8rem;color:#555">
        ${m.totalRequests.toLocaleString()} reqs · ${m.maxVus} max VUs · ${m.duration}
      </div>
    </div>`;
  }).join('');
}

function selectRun(ts) {
  const runs = getRuns();
  selectedRun = runs.find(r => r.meta.timestamp === ts) || null;
  renderSidebar();
  renderMain();
}

function buildMeta(report) {
  const m = report.meta;
  return `<div class="meta">
    <div class="meta-card"><div class="label">Max VUs</div><div class="value">${m.maxVus}</div></div>
    <div class="meta-card"><div class="label">Total Requests</div><div class="value">${m.totalRequests.toLocaleString()}</div></div>
    <div class="meta-card"><div class="label">Duration</div><div class="value">${m.duration}</div></div>
    <div class="meta-card"><div class="label">Failed Rate</div><div class="value ${m.failedRate > 0 ? 'fail' : 'pass'}">${m.failedRate.toFixed(2)}%</div></div>
    <div class="meta-card"><div class="label">Throughput</div><div class="value">${m.throughput.toFixed(1)} req/s</div></div>
    <div class="meta-card"><div class="label">Result</div><div class="value ${m.passed ? 'pass' : 'fail'}">${m.passed ? 'PASSED' : 'FAILED'}</div></div>
  </div>`;
}

function getBatchLabels(vuBatches) {
  return vuBatches.map(b => b.batch).sort((a, b) => {
    const na = parseInt(a.replace('vu-', ''), 10);
    const nb = parseInt(b.replace('vu-', ''), 10);
    return na - nb;
  });
}

function getAllEndpointNames(vuBatches) {
  const names = new Set();
  for (const batch of vuBatches) {
    for (const ep of batch.endpoints) {
      names.add(ep.name);
    }
  }
  return Array.from(names).sort();
}

function renderDegradationChart(report) {
  const vuBatches = report.vuBatches || [];
  const batchLabels = getBatchLabels(vuBatches);
  const endpointNames = getAllEndpointNames(vuBatches);

  const datasets = endpointNames.map(name => {
    const data = batchLabels.map(label => {
      const batch = vuBatches.find(b => b.batch === label);
      const ep = batch?.endpoints.find(e => e.name === name);
      return ep && ep.avg > 0 ? Math.round(ep.avg * 10) / 10 : null;
    });
    return {
      label: name,
      data,
      borderColor: getColorForEndpoint(name, endpointNames.length),
      backgroundColor: getColorForEndpoint(name, endpointNames.length, 0.1),
      tension: 0.2,
      spanGaps: true,
      pointRadius: 3,
    };
  });

  const ctx = document.getElementById('degradationChart').getContext('2d');
  if (degradationChart) degradationChart.destroy();
  degradationChart = new Chart(ctx, {
    type: 'line',
    data: { labels: batchLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 10 } } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const val = ctx.parsed.y;
              return val === null ? `${ctx.dataset.label}: no data` : `${ctx.dataset.label}: ${val}ms`;
            }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: 'VU Batch' } },
        y: { title: { display: true, text: 'Avg Latency (ms)' }, beginAtZero: true },
      }
    }
  });
}

const CHART_COLORS = [
  '#4dabf7', '#dc3545', '#28a745', '#ff9800', '#9c27b0',
  '#00bcd4', '#e91e63', '#8bc34a', '#ff5722', '#3f51b5',
  '#cddc39', '#795548', '#607d8b', '#f44336', '#009688',
  '#673ab7', '#ffc107', '#03a9f4', '#c2185b', '#388e3c',
];
function getColorForEndpoint(name, total, alpha = 1) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = ((hash << 5) - hash) + name.charCodeAt(i);
    hash |= 0;
  }
  const idx = Math.abs(hash) % CHART_COLORS.length;
  if (alpha === 1) return CHART_COLORS[idx];
  const hex = CHART_COLORS[idx];
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildHeatmapTable(report) {
  const vuBatches = report.vuBatches || [];
  const batchLabels = getBatchLabels(vuBatches);
  const endpointNames = getAllEndpointNames(vuBatches);

  if (!batchLabels.length || !endpointNames.length) {
    return '<p>No VU batch data available.</p>';
  }

  // Compute max avg for color scaling
  let maxAvg = 0;
  for (const batch of vuBatches) {
    for (const ep of batch.endpoints) {
      if (ep.avg > maxAvg) maxAvg = ep.avg;
    }
  }

  function heatClass(avg) {
    if (avg <= 0) return 'heatmap-na';
    const ratio = avg / maxAvg;
    if (ratio <= 0.2) return 'heatmap-0';
    if (ratio <= 0.4) return 'heatmap-1';
    if (ratio <= 0.6) return 'heatmap-2';
    if (ratio <= 0.8) return 'heatmap-3';
    return 'heatmap-4';
  }

  const header = `<tr><th>Endpoint</th>${batchLabels.map(l => `<th>${l}</th>`).join('')}</tr>`;
  const rows = endpointNames.map(name => {
    const cells = batchLabels.map(label => {
      const batch = vuBatches.find(b => b.batch === label);
      const ep = batch?.endpoints.find(e => e.name === name);
      if (!ep || ep.avg <= 0) {
        return `<td class="heatmap-cell heatmap-na">-</td>`;
      }
      return `<td class="heatmap-cell ${heatClass(ep.avg)}">${ep.avg.toFixed(1)}</td>`;
    });
    return `<tr><td>${escapeHtml(name)}</td>${cells.join('')}</tr>`;
  }).join('');

  return `<table>${header}${rows}</table>`;
}

function buildThresholds(thresholds) {
  if (!thresholds || !thresholds.length) return '<p>No thresholds configured.</p>';
  return `<table><tr><th>Metric</th><th>Rule</th><th>Result</th></tr>
    ${thresholds.map(t => `<tr class="${t.passed ? 'pass' : 'fail'}"><td>${escapeHtml(t.metric)}</td><td>${escapeHtml(t.rule)}</td><td>${t.passed ? 'pass' : 'fail'}</td></tr>`).join('')}
  </table>`;
}

function buildErrors(errors) {
  if (!errors || !errors.length) return '<p>No errors recorded.</p>';
  return `<table><tr><th>Status</th><th>Count</th><th>%</th></tr>
    ${errors.map(e => `<tr><td>${e.status}</td><td>${e.count}</td><td>${e.percentage.toFixed(2)}%</td></tr>`).join('')}
  </table>`;
}

function renderMain() {
  const el = document.getElementById('main');
  if (!selectedRun) {
    el.innerHTML = '<div class="empty">Select a run from the sidebar to view VU degradation data.</div>';
    return;
  }

  const r = selectedRun;
  const m = r.meta;
  el.innerHTML = `
    <h1>${m.scenario} <span class="badge ${m.passed ? 'pass' : 'fail'}">${m.passed ? 'PASSED' : 'FAILED'}</span></h1>
    <div style="color:#666;font-size:0.9rem;margin-bottom:1rem">${fmtDate(m.timestamp)}</div>
    ${buildMeta(r)}
    <h2>VU Degradation Chart (Avg Latency by Batch)</h2>
    <div class="chart-container"><canvas id="degradationChart"></canvas></div>
    <h2>Heatmap — Avg Latency (ms) per Endpoint per VU Batch</h2>
    ${buildHeatmapTable(r)}
    <h2>Thresholds</h2>${buildThresholds(r.thresholds)}
    <h2>Error Distribution</h2>${buildErrors(r.errors)}
  `;
  renderDegradationChart(r);
}

(async function init() {
  await loadArchive();
  renderSidebar();
  renderMain();
})();
</script>
</body>
</html>
