name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.0.0-dev'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Build macOS
        working-directory: client
        run: flutter build macos --release

      - name: Package release
        run: |
          mkdir -p release
          # The Xcode product name for this project is mobile.app
          APP_NAME="mobile.app"
          zip -r "release/likha-macos-${{ github.ref_name || inputs.version }}.zip" \
            "client/build/macos/Build/Products/Release/${APP_NAME}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: release/*
          tag_name: ${{ github.ref_name || inputs.version }}
          generate_release_notes: true
