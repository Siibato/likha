name: Build & Release Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.0.0-dev'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: likha-server

jobs:
  build-pi-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout Likha repo
        uses: actions/checkout@v4

      - name: Checkout pi-gen
        uses: actions/checkout@v4
        with:
          repository: RPi-Distro/pi-gen
          path: pi-gen
          ref: 2026-06-18-raspios-bookworm-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 server image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -t likha-server:latest \
            -f server/Dockerfile \
            server/

      - name: Save image to tar
        run: |
          mkdir -p deployment/pi-image/stage-likha
          docker save likha-server:latest > deployment/pi-image/stage-likha/likha-server-arm64.tar

      - name: Prepare pi-gen workspace
        run: |
          cp deployment/pi-image/config pi-gen/config
          cp -r deployment/pi-image/stage-likha pi-gen/stage-likha
          # Ensure the image tar is where 01-run.sh expects it
          cp deployment/pi-image/stage-likha/likha-server-arm64.tar pi-gen/stage-likha/likha-server-arm64.tar || true

      - name: Install qemu-user-static for pi-gen
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Build Pi image with pi-gen
        run: |
          cd pi-gen
          ./build-docker.sh

      - name: Compress output image
        run: |
          mkdir -p release
          VERSION="${{ github.ref_name || inputs.version }}"
          SAFE_VERSION="${VERSION//\//-}"
          for img in pi-gen/deploy/*.img; do
            if [ -f "$img" ]; then
              xz -T0 -v "$img"
              mv "$img.xz" "release/likha-server-${SAFE_VERSION}.img.xz"
            fi
          done

      - name: Compute image metadata
        id: meta
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          SAFE_VERSION="${VERSION//\//-}"
          IMG_XZ="release/likha-server-${SAFE_VERSION}.img.xz"
          if [ -f "$IMG_XZ" ]; then
            SIZE_XZ=$(stat -c%s "$IMG_XZ")
            echo "image_download_size=${SIZE_XZ}" >> "$GITHUB_OUTPUT"
            echo "extract_size=3221225472" >> "$GITHUB_OUTPUT"
          fi

      - name: Create distributable bundle
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          SAFE_VERSION="${VERSION//\//-}"
          IMG_XZ="release/likha-server-${SAFE_VERSION}.img.xz"
          BUNDLE_NAME="likha-classroom-server-${SAFE_VERSION}"
          BUNDLE_DIR="release/${BUNDLE_NAME}"

          mkdir -p "$BUNDLE_DIR"

          # Copy launcher scripts and README
          cp deployment/imager-bundle/launch-mac.command "$BUNDLE_DIR/"
          cp deployment/imager-bundle/launch-windows.bat "$BUNDLE_DIR/"
          cp deployment/imager-bundle/README.txt "$BUNDLE_DIR/"
          cp deployment/imager-bundle/os_list_template.json "$BUNDLE_DIR/"

          # Copy image with the simple name launchers expect
          cp "$IMG_XZ" "$BUNDLE_DIR/likha-server.img.xz"

          # Zip it up
          (cd release && zip -r "${BUNDLE_NAME}.zip" "${BUNDLE_NAME}")

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            release/*.img.xz
            release/*.zip
          tag_name: ${{ github.ref_name || inputs.version }}
          generate_release_notes: true

      - name: Update os_list.json manifest
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          SAFE_VERSION="${VERSION//\//-}"
          SIZE_XZ="${{ steps.meta.outputs.image_download_size }}"
          EXTRACT="${{ steps.meta.outputs.extract_size }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/likha-server-${SAFE_VERSION}.img.xz"

          mkdir -p deployment/imager-manifest
          cat > deployment/imager-manifest/os_list.json <<EOF
          {
            "os_list": [
              {
                "name": "Likha Classroom Server",
                "description": "Self-contained classroom server with mesh replication for Raspberry Pi 4/5",
                "icon": "https://likha.app/imager/icon.png",
                "url": "${URL}",
                "extract_size": ${EXTRACT},
                "image_download_size": ${SIZE_XZ},
                "release_date": "$(date +%Y-%m-%d)",
                "init_format": "systemd",
                "devices": [
                  "pi5-64bit",
                  "pi4-64bit"
                ],
                "customization": {
                  "schema": {
                    "mesh_group_id": {
                      "type": "string",
                      "minLength": 3,
                      "maxLength": 32,
                      "description": "School Code / Mesh Group ID (shared by all nodes in the classroom)"
                    },
                    "wifi_ssid": {
                      "type": "string",
                      "maxLength": 64,
                      "description": "Optional WiFi SSID (if not using Ethernet router mode)"
                    },
                    "wifi_password": {
                      "type": "string",
                      "maxLength": 64,
                      "description": "Optional WiFi password"
                    },
                    "wifi_country": {
                      "type": "string",
                      "minLength": 2,
                      "maxLength": 2,
                      "description": "ISO 3166-1 alpha-2 country code for WiFi (e.g., PH, US)"
                    },
                    "school_code": {
                      "type": "string",
                      "maxLength": 32,
                      "description": "School identifier (e.g., ESATQL)"
                    }
                  }
                }
              }
            ]
          }
          EOF

      - name: Upload os_list.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: os_list.json
          path: deployment/imager-manifest/os_list.json
